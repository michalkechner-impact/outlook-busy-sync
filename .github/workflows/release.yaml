# Safety note: this workflow does not consume any user-controlled text in
# shell commands; the only template expansions are for `secrets.*`, which
# are not attacker-controlled.
#
# Third-party actions are pinned to commit SHAs to prevent a tag-push
# compromise from injecting code into release artefacts.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.x'
          cache: true
      - uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          distribution: goreleaser
          version: v2.15.4
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # HOMEBREW_TAP_TOKEN is a fine-grained PAT scoped to the
          # homebrew-tap repository only. Without it, the brew formula
          # publish step is skipped but a GitHub Release is still
          # produced.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # SCOOP_BUCKET_TOKEN is a fine-grained PAT scoped to the
          # scoop-bucket repository only. Same fallback: without it the
          # Scoop manifest publish is skipped but the GitHub Release
          # still succeeds.
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
