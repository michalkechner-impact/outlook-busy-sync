# CodeQL analysis. Free for public repositories. Complements the
# govulncheck job (which catches known stdlib/dep CVEs) by running
# semantic analysis over the project's own code — OAuth, HTTP, and
# file-handling code are the things most worth static analysis here.
#
# Safety: this workflow does not consume any user-controlled text
# (issue titles, PR bodies, commit messages, branch names) in shell
# commands. Only `${{ matrix.language }}` is expanded, and that value
# is a hard-coded matrix entry we control. The injection pattern at
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
# does not apply.
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 06:00 UTC. The schedule keeps analysis fresh when
    # a month passes without commits and new CodeQL queries land.
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.x"
          cache: true
      - uses: github/codeql-action/init@76621b61decf072c1cee8dd1ce2d2a82d33c17ed # v3.29.8
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/autobuild@76621b61decf072c1cee8dd1ce2d2a82d33c17ed # v3.29.8
      - uses: github/codeql-action/analyze@76621b61decf072c1cee8dd1ce2d2a82d33c17ed # v3.29.8
        with:
          category: "/language:${{ matrix.language }}"
