# Safety note: this workflow does not consume any user-controlled text
# (issue titles, PR bodies, commit messages, branch names, etc.) in shell
# commands. The only `${{ ... }}` expansions are `matrix.*` values we
# define ourselves and `runner.os`, so the command-injection class at
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
# does not apply here.
#
# Third-party actions are pinned to commit SHAs (not just major-version
# tags) so a tag-push compromise of an upstream action repo cannot
# silently inject code into our builds. When bumping, update both the
# SHA and the trailing version comment.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: '1.25.x'
          cache: true
      - name: Test
        # `go test -race` works everywhere, but we skip it on Windows to
        # keep CI fast and match the release build flags (CGO-less).
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            go test -coverprofile=coverage.txt -covermode=atomic ./...
          else
            go test -race -coverprofile=coverage.txt -covermode=atomic ./...
          fi
      - uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.txt

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: '1.25.x'
          cache: true
      - uses: golangci/golangci-lint-action@25e2cdc5eb1d7a04fdc45ff538f1a00e960ae128 # v8.0.0
        with:
          # Pin the linter binary to a specific v2.x so a silent upstream
          # version bump can't fail the build without a visible diff.
          version: v2.11.4

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: '1.25.x'
          cache: true
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build-matrix:
    # Smoke-test that the binary compiles for every target we ship in
    # .goreleaser.yaml, so we catch platform-specific regressions without
    # running the full release pipeline on every PR.
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: '1.25.x'
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o /tmp/out ./cmd/outlook-busy-sync
