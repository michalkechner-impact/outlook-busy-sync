# Safety note: this workflow does not consume any user-controlled text
# (issue titles, PR bodies, commit messages, branch names, etc.) in shell
# commands. The only `${{ ... }}` expansions are `matrix.*` values we
# define ourselves and `runner.os`, so the command-injection class at
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
# does not apply here.
#
# Third-party actions are pinned to commit SHAs (not just major-version
# tags) so a tag-push compromise of an upstream action repo cannot
# silently inject code into our builds. When bumping, update both the
# SHA and the trailing version comment.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.x'
          cache: true
      - name: Test
        # `go test -race` works everywhere, but we skip it on Windows to
        # keep CI fast and match the release build flags (CGO-less).
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            go test -coverprofile=coverage.txt -covermode=atomic ./...
          else
            go test -race -coverprofile=coverage.txt -covermode=atomic ./...
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.txt

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.x'
          cache: true
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          # Pin the linter binary to a specific v2.x so a silent upstream
          # version bump can't fail the build without a visible diff.
          version: v2.11.4

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.x'
          cache: true
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build-matrix:
    # Smoke-test that the binary compiles for every target we ship in
    # .goreleaser.yaml, so we catch platform-specific regressions without
    # running the full release pipeline on every PR.
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.x'
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o /tmp/out ./cmd/outlook-busy-sync
